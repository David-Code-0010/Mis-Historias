<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Historias - Red Neon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="aero-background">
    <div class="bubbles-overlay"></div>

    <header class="dark-aero-header">
        <div class="container header-content">
            <div class="logo-aero">MIS-<span class="orange-glow">HISTORIAS</span></div>
            <nav class="aero-nav">
                <div class="nav-group-left">
                    <button class="btn-aero-text active" onclick="mostrarSeccion('descubrir')">DESCUBRIR</button>
                    <button class="btn-aero-text" onclick="mostrarSeccion('escribir')">ESCRIBIR</button>
                </div>
                <div class="nav-group-right">
                    <div class="search-container-aero">
                        <input type="text" placeholder="Buscar en la red...">
                        <button class="btn-search-aero"></button>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">
        <section id="seccion-descubrir" class="seccion-aero">
            <h2 class="genre-title">BIBLIOTECA DE LA RED NEON</h2>
            <div id="grid-historias" class="historias-aero-grid">
                </div>
        </section>

        <section id="seccion-escribir" class="seccion-aero hidden-aero">
            <div class="flex-container">
                <div class="flex-1 glassy-box p-30">
                    <h2 class="aero-title-glow">TRANSMITIR RELATO</h2>
                    <form id="formulario-historia" class="formulario-aero">
                        <input type="text" id="titulo" placeholder="TÍTULO DEL ARCHIVO..." required>
                        <input type="text" id="autor" placeholder="IDENTIDAD DEL AUTOR...">
                        
                        <div class="mb-20">
                            <label style="color:var(--aero-aqua-base); font-weight:bold;">CARGAR HASTA 5 ESCENAS:</label>
                            <input type="file" id="fotos" multiple accept="image/*" class="responsive-file-input mt-10">
                            <div id="preview-grid" class="preview-grid mt-10"></div>
                        </div>

                        <textarea id="texto" placeholder="Inicia la escritura... Cada párrafo podrá ser comentado individualmente por la red." required></textarea>
                        
                        <button type="submit" class="btn-aero-submit">PUBLICAR EN BASE DE DATOS NEON</button>
                    </form>
                </div>

                <aside class="sidebar-aero">
                    <div class="glassy-box sidebar-block">
                        <h3 class="sidebar-aero-title">LECTORES OPINAN ✨</h3>
                        <div id="comentarios-dinamicos" class="opiniones-scroll">
                            <p class="opinion-aero-text" style="color:var(--text-grey);">Selecciona una historia para ver los comentarios por párrafo.</p>
                        </div>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
