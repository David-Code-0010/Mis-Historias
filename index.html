<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis-Historias | Dark Aero Skeuomorphic Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="aero-background">
    <div class="bubbles-overlay"></div>

    <header class="dark-aero-header">
        <div class="container header-content">
            <h1 class="logo-aero">mis<span class="orange-glow">-historias</span></h1>
            
            <nav class="aero-nav">
                <div class="nav-group-left">
                    <button id="btn-descubre" class="btn-aero-text active">Descubre</button>
                    <div class="search-container-aero">
                        <input type="search" id="search-input" placeholder="Buscar historias... (Enter)">
                        <button class="btn-search-aero"></button>
                    </div>
                </div>

                <div class="nav-group-right">
                    <button id="btn-crea" class="btn-aero-text">Escribir</button>
                    <button id="btn-comunidad" class="btn-aero-text">Comunidad</button>
                    
                    <div id="lang-selector-aero" class="lang-selector-aero glassy-box">
                        <div class="lang-display">
                            <span class="icon-help">?</span>
                            <span id="current-lang">Español</span>
                            <span class="arrow-down">▼</span>
                        </div>
                        <ul id="lang-dropdown" class="lang-dropdown hidden-aero glassy-box">
                            <li data-lang="es">Español</li><li data-lang="en">English</li>
                            <li data-lang="pt">Português</li><li data-lang="fr">Français</li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        <section id="layout-principal" class="flex-container">
            
            <div id="columna-contenido" class="flex-1">
                <div id="seccion-descubrir">
                    <h2 class="genre-title">BIBLIOTECA VIRTUAL</h2>
                    <div id="lista-historias-descubrir" class="historias-aero-grid">
                        </div>
                </div>

                <div id="seccion-lectura" class="hidden-aero glassy-box p-30">
                    <button id="btn-volver" class="btn-aero-text mb-20">← Volver a Biblioteca</button>
                    <div id="contenido-lectura-dinamico" class="reading-content">
                        </div>
                </div>
            </div>

            <aside id="sidebar-derecho" class="sidebar-aero">
                <div class="sidebar-block glassy-box">
                    <h3 id="titulo-opiniones" class="sidebar-aero-title">LECTORES OPINAN ✨</h3>
                    <div id="opiniones-contenedor" class="opiniones-scroll">
                        <p class="empty-msg" style="color:var(--text-grey); font-size:12px; font-style:italic;">Selecciona una historia para ver los comentarios.</p>
                    </div>

                    <div id="caja-escribir-comentario" class="hidden-aero mt-10" style="border-top: 1px solid #333; padding-top: 15px;">
                        <input type="text" id="input-nuevo-comentario" placeholder="Escribe tu comentario en este párrafo..." style="width: 100%; padding: 8px; background: rgba(0,0,0,0.5); border: 1px solid var(--aero-aqua-base); color: var(--pure-white); border-radius: 4px; margin-bottom: 8px; font-size: 13px;">
                        <button id="btn-enviar-comentario" class="btn-aero-submit" style="padding: 8px; font-size: 13px;">ENVIAR</button>
                    </div>
                </div>
            </aside>
        </section>

        <section id="seccion-escribir" class="hidden-aero flex-container">
            <div class="flex-1 glassy-box p-30">
                <h2 class="aero-title-glow">Nueva Historia</h2>
                <form id="formulario-historia" class="formulario-aero">
                    <input type="text" id="titulo-historia" placeholder="Título de la historia (ej: Sombras Neón)" required>
                    
                    <div class="upload-zone mb-20">
                        <label style="color:var(--aero-aqua-base); font-size:14px; font-weight:bold; display:block; margin-bottom:10px;">Sube hasta 5 fotos (Portadas o Escenas):</label>
                        <input type="file" id="fotos-historia" accept="image/*" multiple class="responsive-file-input">
                        <div id="preview-fotos" class="preview-grid mt-10"></div>
                    </div>

                    <textarea id="contenido-historia" placeholder="Escribe el contenido aquí. Usa 'Enter' para crear nuevos párrafos comentables..." required></textarea>
                    <button type="submit" class="btn-aero-submit">PUBLICAR EN MIS-HISTORIAS</button>
                </form>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
