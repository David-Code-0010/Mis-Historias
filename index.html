<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MisHistorias | Dark Aero 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="aero-body">
    <div class="aero-bubbles"></div>

    <header class="aero-header">
        <div class="container header-flex">
            <h1 class="aero-logo">mis<span>historias</span></h1>
            <nav class="nav-links">
                <button id="btn-descubre" class="nav-btn active">Descubre</button>
                <div class="aero-search">
                    <input type="text" id="search-input" placeholder="Buscar historias...">
                </div>
                <button id="btn-crea" class="nav-btn">Escribir</button>
                <div class="lang-wrapper">
                    <button id="lang-toggle" class="glass-select">Español ▼</button>
                    <ul id="lang-list" class="lang-dropdown hidden">
                        <li>Español</li><li>English</li><li>Português</li><li>Français</li>
                        <li>Deutsch</li><li>Italiano</li><li>日本語</li><li>Русский</li><li>中文</li>
                    </ul>
                </div>
            </nav>
        </div>
    </header>

    <main class="container main-layout">
        <section class="content-area">
            <div id="seccion-descubrir">
                <h2 class="aero-subtitle">BIBLIOTECA VIRTUAL</h2>
                <div id="grid-historias" class="aero-grid"></div>
            </div>

            <div id="seccion-lectura" class="hidden">
                <button id="btn-back" class="nav-btn">← Volver</button>
                <div id="texto-historia" class="glass-panel reading-mode"></div>
            </div>

            <div id="seccion-escribir" class="hidden">
                <div class="glass-panel">
                    <h2 class="aero-title">Publicar Capítulo</h2>
                    <form id="form-publicar" class="aero-form">
                        <input type="text" id="post-titulo" placeholder="Título de la historia" required>
                        <div class="upload-zone">
                            <label>Sube hasta 5 fotos (Portadas/Escenas):</label>
                            <input type="file" id="post-fotos" accept="image/*" multiple>
                            <div id="previsualizacion" class="photo-preview"></div>
                        </div>
                        <textarea id="post-contenido" placeholder="Escribe aquí tu historia..." required></textarea>
                        <button type="submit" class="aero-button-orange">PUBLICAR AHORA</button>
                    </form>
                </div>
            </div>
        </section>

        <aside class="sidebar-right">
            <div class="glass-panel sidebar-fixed">
                <h3 class="sidebar-label">LECTORES OPINAN ✨</h3>
                <div id="comentarios-flujo" class="comments-container">
                    <p class="empty-txt">Selecciona una historia para ver la actividad...</p>
                </div>
            </div>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
