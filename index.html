<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis-Historias | Aero</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="bubbles-overlay"></div>

    <header class="dark-aero-header">
        <div class="container header-content">
            <h1 class="logo-aero">mis<span class="orange-glow">-historias</span></h1>
            
            <nav class="aero-nav" style="flex-wrap: wrap; justify-content: flex-end;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <input type="search" id="search-input" placeholder="Buscar historias... (Enter)" style="background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; outline: none; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);">
                    <button id="btn-descubre" class="btn-aero-text active">Biblioteca</button>
                    <button id="btn-crea" class="btn-aero-text">Escribir</button>
                    <button id="btn-bot" class="btn-aero-text" style="color: var(--green-accent)">Bot 🤖</button>
                </div>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        
        <section id="seccion-descubrir">
            <h2 class="genre-title">BIBLIOTECA VIRTUAL</h2>
            <div id="lista-historias-descubrir" class="historias-aero-grid">
                </div>
        </section>

        <section id="seccion-lectura" class="hidden-aero flex-container">
            <div class="flex-1">
                <div class="glassy-box p-30">
                    <button id="btn-volver" class="btn-aero-text mb-20">← Volver a Biblioteca</button>
                    <div id="contenido-lectura-dinamico">
                        </div>
                </div>
            </div>

            <aside class="sidebar-aero sidebar-fixed">
                <div class="glassy-box p-20">
                    <h3 id="titulo-opiniones" class="aero-title-glow" style="font-size: 1.1rem;">LECTORES OPINAN ✨</h3>
                    <div id="opiniones-contenedor" class="opiniones-scroll" style="min-height: 150px;">
                        <p class="empty-msg">Selecciona un párrafo para ver u opinar.</p>
                    </div>

                    <div id="caja-escribir-comentario" class="hidden-aero mt-10" style="border-top: 1px solid rgba(0,255,216,0.1); padding-top: 15px;">
                        <input type="text" id="input-nuevo-comentario" placeholder="Escribe tu opinión aquí..." style="width: 100%; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: var(--text); border-radius: 8px; margin-bottom: 10px; font-size: 0.9rem; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);">
                        <button id="btn-enviar-comentario" class="btn-aero-submit" style="padding: 10px; font-size: 0.9rem; width: 100%;">ENVIAR COMENTARIO</button>
                    </div>
                </div>
            </aside>
        </section>

        <section id="seccion-escribir" class="hidden-aero">
            <div class="glassy-box p-30">
                <h2 class="aero-title-glow">Nueva Historia</h2>
                <form id="formulario-historia" class="formulario-aero">
                    <input type="text" id="titulo-historia" placeholder="TÍTULO DE TU RELATO..." required>
                    <input type="text" id="autor-historia" placeholder="TU ALIAS EN EL SISTEMA..." required>
                    
                    <div class="mb-20 upload-zone" style="background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; border: 1px dashed rgba(255,255,255,0.1);">
                        <label style="color: var(--aqua); font-weight: 600; display: block; margin-bottom: 10px;">Sube hasta 5 fotos (Portadas o Escenas):</label>
                        <input type="file" id="fotos-historia" accept="image/*" multiple style="color: var(--text-dim);">
                        <div id="preview-fotos" class="preview-grid mt-10"></div>
                    </div>

                    <textarea id="contenido-historia" placeholder="Escribe tu historia aquí... Usa 'Enter' para crear nuevos párrafos comentables." required style="min-height: 300px;"></textarea>
                    
                    <button type="submit" class="btn-aero-submit">PUBLICAR EN LA RED NEON</button>
                </form>
            </div>
        </section>

        <section id="seccion-bot" class="hidden-aero">
            <div class="glassy-box p-30">
                <h2 class="aero-title-glow" style="color: var(--aqua)">Cerebro Colectivo</h2>
                <div id="chat-window" class="opiniones-scroll" style="height:350px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 10px; margin-bottom: 15px; border: 1px solid rgba(0,255,216,0.1);">
                    <div class="msg-bot"><p>Conectando con la base de datos... Estoy listo para charlar sobre las historias, David.</p></div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="input-bot" placeholder="Pregunta sobre las historias..." style="flex: 1; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: var(--text); border-radius: 8px;">
                    <button id="btn-enviar-bot" class="btn-aero-submit" style="width: auto; padding: 0 30px;">Enviar</button>
                </div>
            </div>
        </section>
    </main>

    <div id="auth-container" class="flex-container" style="justify-content: center; margin-top: 40px;">
  <div class="glassy-box" style="width: 100%; max-width: 400px; padding: 30px;">
    
    <h2 id="auth-title" class="aero-title-glow" style="text-align: center; font-size: 1.8rem;">Iniciar Sesión</h2>
    <p class="genre-title" style="text-align: center; margin-bottom: 24px;">ACCESO AL PORTAL</p>
    
    <form id="auth-form" class="formulario-aero" style="display: flex; flex-direction: column; gap: 18px;">
      
      <div>
        <label class="genre-title" style="display: block; margin-bottom: 8px;">USUARIO</label>
        <input type="text" id="username-input" placeholder="Tu alias de escritor..." required autocomplete="off">
      </div>
      
      <div>
        <label class="genre-title" style="display: block; margin-bottom: 8px;">CONTRASEÑA</label>
        <input type="password" id="password-input" placeholder="••••••••" required>
      </div>

      <button type="submit" id="auth-submit-btn" class="btn-aero-submit" style="width: 100%; margin-top: 10px;">
        Entrar
      </button>
    </form>

    <div style="text-align: center; margin-top: 24px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;">
      <span style="color: var(--text-dim); font-size: 0.9rem;" id="auth-switch-text">¿No tienes cuenta?</span>
      <button id="toggle-auth-btn" class="btn-aero-text" style="background: transparent; box-shadow: none; border: none; color: var(--aqua); padding: 0 5px;">
        Regístrate aquí
      </button>
    </div>

  </div>
</div>
    <script src="./app.js"></script>
</body>
</html>
