<body class="aero-background">
    <div class="bubbles-overlay"></div>

    <header class="dark-aero-header">
        <div class="container header-content">
            <h1 class="logo-aero">mis<span class="orange-glow">-historias</span></h1>
            
            <nav class="aero-nav">
                <div class="nav-group-left">
                    <button id="btn-descubre" class="btn-aero-text active">Descubre</button>
                    <div class="search-container-aero">
                        <input type="search" id="search-input" placeholder="Buscar historias... (Enter)">
                        <button class="btn-search-aero"></button>
                    </div>
                </div>

                <div class="nav-group-right">
                    <button id="btn-crea" class="btn-aero-text">Escribir</button>
                    <button id="btn-comunidad" class="btn-aero-text">Comunidad</button>
                    <button id="btn-bot" class="btn-aero-text" style="color: var(--aero-green-base); border: 1px solid rgba(51,255,51,0.2);">Bot 🤖</button>
                </div>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        <section id="seccion-bot" class="hidden-aero flex-container">
            <div class="flex-1 glassy-box p-30">
                <h2 class="aero-title-glow" style="color: var(--aero-green-base); text-shadow: 0 0 10px rgba(51,255,51,0.8);">
                    Cerebro Colectivo GPT
                </h2>
                <p style="font-size: 12px; color: var(--text-grey); margin-bottom: 20px;">
                    Esta IA aprende de cada historia publicada. Pregúntale sobre la biblioteca.
                </p>
                
                <div id="chat-window" class="opiniones-scroll" style="height: 400px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px;">
                    <div class="opinion-aero">
                        <span class="opinion-aero-author">Bot:</span>
                        <p class="opinion-aero-text">Hola David. He procesado las historias actuales. ¿De qué quieres que hablemos hoy?</p>
                    </div>
                </div>

                <div class="formulario-aero" style="display: flex; gap: 10px;">
                    <input type="text" id="input-bot" placeholder="Habla con la IA..." style="margin-bottom: 0;">
                    <button id="btn-enviar-bot" class="btn-aero-submit" style="width: auto; background: var(--aero-aqua-glow);">ENVIAR</button>
                </div>
            </div>
        </section>
    </main>

    <script src="./app.js"></script>
</body>
