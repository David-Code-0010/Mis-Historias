<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MisHistorias | Dark Aero Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="aero-background">

    <header class="dark-aero-header">
        <div class="container header-content">
            <h1 class="logo-aero">mis<span class="orange-glow">historias</span></h1>
            <nav class="aero-nav">
                <div class="nav-group-left">
                    <button id="btn-descubre" class="btn-aero-text active">Descubre</button>
                    <div class="search-container-aero">
                        <input type="search" id="search-input" placeholder="Buscar historias o autores...">
                    </div>
                </div>
                <div class="nav-group-right">
                    <button id="btn-crea" class="btn-aero-text">Escribir</button>
                    <div id="lang-selector-aero" class="lang-selector-aero">
                        <div class="lang-display glassy-box-header">
                            <span id="current-lang">Español</span> <span class="arrow-down">▼</span>
                        </div>
                        <ul id="lang-dropdown" class="lang-dropdown hidden-aero">
                            <li>Español</li><li>English</li><li>Português</li><li>Français</li>
                            <li>Deutsch</li><li>Italiano</li><li>日本語</li><li>Русский</li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        <section id="layout-principal" class="flex-container">
            <div id="columna-contenido" class="flex-1">
                <div id="seccion-descubrir">
                    <h2 class="genre-title">BIBLIOTECA</h2>
                    <div id="lista-historias-descubrir" class="historias-aero-grid"></div>
                </div>

                <div id="seccion-lectura" class="hidden-aero">
                    <button id="btn-volver" class="btn-aero-text">← Volver</button>
                    <div id="contenido-lectura-dinamico" class="reading-glass-container"></div>
                </div>
            </div>

            <aside id="sidebar-derecho" class="sidebar-aero">
                <div class="sidebar-block-aero">
                    <h3 class="sidebar-title">LECTORES OPINAN ✨</h3>
                    <div id="opiniones-contenedor" class="opiniones-scroll">
                        <p class="empty-msg">Entra en una historia para leer comentarios.</p>
                    </div>
                </div>
            </aside>
        </section>

        <section id="seccion-escribir" class="hidden-aero">
            <div class="write-glass-box">
                <h2 class="aero-title-glow">Nueva Historia</h2>
                <form id="formulario-historia" class="formulario-aero">
                    <input type="text" id="titulo-historia" placeholder="Título de la obra" required>
                    
                    <div class="upload-section">
                        <label>Sube tus 5 imágenes (Portada y Escenas):</label>
                        <input type="file" id="fotos-historia" accept="image/*" multiple>
                        <div id="preview-fotos" class="preview-grid"></div>
                    </div>

                    <textarea id="contenido-historia" placeholder="Escribe tu historia aquí..." required></textarea>
                    <button type="submit" class="btn-aero-orange-submit">PUBLICAR HISTORIA</button>
                </form>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
