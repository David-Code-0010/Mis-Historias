<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Historias - Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bubbles-overlay"></div>

  <div class="container flex-container" style="justify-content: center; align-items: center; min-height: 80vh;">
    
    <div class="glassy-box" style="width: 100%; max-width: 420px; padding: 40px;">
      <h2 id="auth-title" class="aero-title-glow" style="text-align: center; font-size: 1.8rem;">Iniciar Sesión</h2>
      <p class="genre-title" style="text-align: center; margin-bottom: 24px;">ACCESO AL PORTAL</p>

      <div class="avatar-container">
        <label for="avatar-input" class="avatar-label">
          <img id="pfp-preview" src="https://i.pravatar.cc/150?img=32" alt="Avatar del usuario" class="avatar-aero">
          <div class="avatar-overlay">
            📷 Cambiar
          </div>
        </label>
        <input type="file" id="avatar-input" accept="image/*" class="hidden-file-input">
      </div>

      <form id="auth-form" class="formulario-aero" style="display: flex; flex-direction: column; gap: 18px;">
        <div>
          <label style="font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 8px; display: block; font-weight: 600;">USUARIO</label>
          <input type="text" placeholder="Tu alias de escritor..." required>
        </div>
        
        <div>
          <label style="font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 8px; display: block; font-weight: 600;">CONTRASEÑA</label>
          <input type="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-aero-submit" style="margin-top: 10px; padding: 14px;">Entrar</button>
      </form>
      
      <p style="text-align: center; margin-top: 24px; font-size: 0.9rem; color: var(--text-dim);">
        ¿No tienes cuenta? <span style="color: var(--aqua); cursor: pointer; font-weight: 600; transition: text-shadow 0.2s;" onmouseover="this.style.textShadow='0 0 10px rgba(0,255,216,0.4)'" onmouseout="this.style.textShadow='none'">Regístrate aquí</span>
      </p>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
