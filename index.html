<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero - Portal de Historias</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bubbles-overlay"></div>

    <nav class="aero-nav">
        <button id="btn-descubre" class="active">Descubrir</button>
        <button id="btn-crea">Escribir</button>
        <button id="btn-bot">Cerebro Colectivo</button>
        <button id="btn-auth-nav">Perfil / Entrar</button>
    </nav>

    <main class="container">
        
        <section id="seccion-descubrir">
            <h2 class="aero-title-glow">Historias Recientes</h2>
            <div id="lista-historias-descubrir" class="grid-historias">
                </div>
        </section>

        <section id="seccion-lectura" style="display: none;">
            <button id="btn-volver" class="btn-aero-secundario">← Volver</button>
            <div class="flex-container">
                <div id="contenido-lectura-dinamico" class="glassy-box lectura-main"></div>
                <aside class="lectura-sidebar">
                    <div class="glassy-box">
                        <h3 id="titulo-opiniones" class="genre-title">OPINIONES ✨</h3>
                        <div id="opiniones-contenedor"></div>
                        <div id="caja-escribir-comentario" style="display: none;">
                            <input type="text" id="input-nuevo-comentario" placeholder="Escribe tu opinión...">
                            <button id="btn-enviar-comentario" class="btn-aero-submit">Enviar</button>
                        </div>
                    </div>
                </aside>
            </div>
        </section>

        <section id="seccion-escribir" style="display: none;">
            <div class="glassy-box" style="max-width: 800px; margin: 0 auto;">
                <h2 class="aero-title-glow">Nueva Historia</h2>
                <form id="formulario-historia" class="formulario-aero">
                    <input type="text" id="titulo-historia" placeholder="Título de la obra" required>
                    <input type="text" id="autor-historia" placeholder="Tu pseudónimo">
                    <textarea id="contenido-historia" placeholder="Escribe aquí tu relato..." rows="10" required></textarea>
                    
                    <label class="genre-title">PORTADAS (Puedes elegir varias)</label>
                    <input type="file" id="fotos-historia" accept="image/*" multiple>
                    <div id="preview-fotos" class="grid-previews"></div>
                    
                    <button type="submit" class="btn-aero-submit">Publicar en la Red Neon</button>
                </form>
            </div>
        </section>

        <section id="seccion-bot" style="display: none;">
            <div class="glassy-box" style="max-width: 600px; margin: 0 auto;">
                <h2 class="aero-title-glow">Cerebro Colectivo</h2>
                <div id="chat-window" class="chat-container"></div>
                <div class="chat-input-area">
                    <input type="text" id="input-bot" placeholder="Pregunta a la IA...">
                    <button id="btn-enviar-bot" class="btn-aero-submit">Enviar</button>
                </div>
            </div>
        </section>

        <section id="seccion-auth" style="display: none;">
            <div class="glassy-box" style="max-width: 420px; margin: 40px auto; padding: 40px;">
                <h2 id="auth-title" class="aero-title-glow" style="text-align: center;">Iniciar Sesión</h2>
                
                <div class="avatar-container">
                    <label for="avatar-input" class="avatar-label">
                        <img id="pfp-preview" src="https://i.pravatar.cc/150?img=32" alt="PFP" class="avatar-aero">
                        <div class="avatar-overlay">📷 Cambiar</div>
                    </label>
                    <input type="file" id="avatar-input" accept="image/*" class="hidden-file-input">
                </div>

                <form id="auth-form" class="formulario-aero">
                    <input type="text" id="username-input" placeholder="Usuario" required>
                    <input type="password" id="password-input" placeholder="Contraseña" required>
                    <button type="submit" id="auth-submit-btn" class="btn-aero-submit">Entrar</button>
                </form>

                <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-dim);">
                    <span id="auth-switch-text">¿No tienes cuenta?</span> 
                    <span id="toggle-auth-btn" style="color: var(--aqua); cursor: pointer; font-weight: bold;">Regístrate aquí</span>
                </p>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
