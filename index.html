<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MisHistorias | Dark Aero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="aero-background">

    <header class="dark-aero-header">
        <div class="container header-content">
            <h1 class="logo-aero">mis<span class="orange-glow">historias</span></h1>
            <nav class="aero-nav">
                <div class="nav-group-left">
                    <button id="btn-descubre" class="btn-aero-text active">Descubre</button>
                    <div class="search-container-aero">
                        <input type="search" id="search-input" placeholder="Buscar historias o autores...">
                    </div>
                </div>
                <div class="nav-group-right">
                    <button id="btn-crea" class="btn-aero-text">Escribir</button>
                    <button class="btn-aero-text">Comunidad</button>
                    <div id="lang-selector-aero" class="lang-selector-aero">
                        <div class="lang-display glassy-box">
                            <span id="current-lang">Español</span> <span class="arrow-down">▼</span>
                        </div>
                        <ul id="lang-dropdown" class="lang-dropdown hidden-aero glassy-box">
                            <li data-lang="es">Español</li><li data-lang="en">English</li>
                            <li data-lang="pt">Português</li><li data-lang="fr">Français</li>
                            <li data-lang="it">Italiano</li><li data-lang="ja">日本語</li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        <section id="layout-principal" class="flex-container">
            <div id="columna-contenido" class="flex-1">
                <div id="seccion-descubrir">
                    <h2 class="genre-title">ROMANCE</h2>
                    <div id="lista-historias-descubrir" class="historias-aero-grid"></div>
                </div>

                <div id="seccion-lectura" class="hidden-aero">
                    <button id="btn-volver" class="btn-aero-text">← Volver al inicio</button>
                    <div id="contenido-lectura-dinamico" class="reading-container glassy-box"></div>
                </div>
            </div>

            <aside id="sidebar-derecho" class="sidebar-aero">
                <div class="sidebar-block glassy-box">
                    <h3 class="sidebar-aero-title">LECTORES OPINAN ✨</h3>
                    <div id="opiniones-contenedor" class="opiniones-scroll">
                        <p class="empty-msg">Selecciona una historia para ver comentarios.</p>
                    </div>
                </div>
            </aside>
        </section>

        <section id="seccion-escribir" class="hidden-aero">
            <div class="write-container glassy-box">
                <h2 class="aero-title-glow">Publicar Nueva Historia</h2>
                <form id="formulario-historia" class="formulario-aero">
                    <input type="text" id="titulo-historia" placeholder="Título (ej: Atrapada en la mafia)" required>
                    
                    <label class="label-aero">Sube hasta 5 fotos (Portadas o Escenas):</label>
                    <input type="file" id="fotos-historia" accept="image/*" multiple>
                    <div id="preview-fotos" class="preview-grid"></div>

                    <textarea id="contenido-historia" placeholder="Escribe tu primer párrafo..." required></textarea>
                    <button type="submit" class="btn-aero-submit">Post Capítulo</button>
                </form>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
