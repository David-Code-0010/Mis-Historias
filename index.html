<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MisHistorias | Dark Aero 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="aero-background">

    <header class="dark-aero-header">
        <div class="container header-content">
            <h1 class="logo-aero">mis<span class="orange-glow">historias</span></h1>
            
            <nav class="aero-nav">
                <div class="nav-group-left">
                    <button id="btn-descubre" class="btn-aero-text active">Descubre</button>
                    <div class="search-container-aero">
                        <input type="search" id="search-input" placeholder="Buscar historias o autores...">
                    </div>
                </div>

                <div class="nav-group-right">
                    <button id="btn-crea" class="btn-aero-text">Escribir</button>
                    
                    <div id="lang-selector-aero" class="lang-selector-aero">
                        <div class="lang-display glassy-box">
                            <span id="current-lang">Español</span>
                            <span class="arrow-down">▼</span>
                        </div>
                        <ul id="lang-dropdown" class="lang-dropdown hidden-aero glassy-box">
                            <li>Español</li><li>English</li><li>Português</li><li>Français</li>
                            <li>Deutsch</li><li>Italiano</li><li>日本語</li><li>한국어</li><li>Русский</li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        <section id="seccion-descubrir" class="flex-container">
            <div class="main-stories-grid flex-1">
                <h2 class="genre-title">BIBLIOTECA AERO</h2>
                <div id="lista-historias-descubrir" class="historias-aero-grid"></div>
            </div>

            <aside class="sidebar-aero">
                <div class="sidebar-block glassy-box">
                    <h3 class="sidebar-aero-title">LECTORES OPINAN</h3>
                    <div id="opiniones-contenedor" class="opiniones-scroll">
                        <p class="empty-msg">Selecciona una historia para ver los comentarios.</p>
                    </div>
                </div>
            </aside>
        </section>

        <section id="seccion-escribir" class="hidden-aero">
            <div class="write-container glassy-box">
                <h2 class="aero-title-glow">Publicar Nueva Historia</h2>
                <form id="formulario-historia" class="formulario-aero">
                    <input type="text" id="titulo-historia" placeholder="Título" required>
                    <textarea id="contenido-historia" placeholder="Escribe tu primer párrafo aquí..." required></textarea>
                    <p style="font-size: 10px; color: #0cf;">* Por ahora se asignarán imágenes Aero por defecto.</p>
                    <div class="form-actions">
                        <button type="submit" class="btn-aero-submit">PUBLICAR</button>
                    </div>
                </form>
            </div>
        </section>

        <section id="seccion-lectura" class="hidden-aero">
            <div class="reading-container glassy-box">
                <button id="btn-volver" class="btn-aero-text">← Volver</button>
                <div id="contenido-lectura-dinamico"></div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
